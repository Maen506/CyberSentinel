<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneyTrack - Admin Login</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --blue: #58a6ff;
            --red: #f85149;
            --muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(88,166,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(248,81,73,0.03) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 36px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
        }

        .form-group input::placeholder {
            color: #3b434e;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1f6feb, #58a6ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(88,166,255,0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid var(--red);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 16px;
            color: var(--red);
            font-size: 13px;
            text-align: center;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .error-msg.show { display: block; }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: #3b434e;
        }

        .footer-note code {
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--blue);
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">🍯</div>
                <h1>HoneyTrack</h1>
                <p>Service-Emulating Honeypot Dashboard</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter admin username" 
                            required 
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter password" 
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In to Dashboard
                </button>

                <div class="error-msg" id="errorMsg"></div>
            </form>

            <div class="footer-note">
                🔐 Default: <code>admin</code> / <code>HoneyTrack2026!</code>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // إخفاء رسائل الخطأ السابقة
            errorMsg.classList.remove('show');
            
            // تعطيل الزر وإظهار التحميل
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // حفظ الـ token في cookie
                    document.cookie = `auth_token=${data.token}; path=/; max-age=${24*60*60}; SameSite=Lax`;
                    
                    // التوجيه للـ Dashboard
                    window.location.href = '/';
                } else {
                    // إظهار رسالة الخطأ
                    errorMsg.textContent = data.error || '⚠️ Invalid username or password';
                    errorMsg.classList.add('show');
                    
                    // إعادة تعيين كلمة المرور
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                errorMsg.textContent = '🔌 Connection error. Is the server running?';
                errorMsg.classList.add('show');
            } finally {
                // إعادة تفعيل الزر
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In to Dashboard';
            }
        });

        // تحويل للمسار الصحيح إذا كان المستخدم مسجل دخول مسبقاً
        if (document.cookie.includes('auth_token=')) {
            fetch('/api/verify-token')
                .then(res => res.json())
                .then(data => {
                    if (data.valid) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {});
        }
    </script>
</body>
</html>
